<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球 GDP 3D 地球仪</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; overflow: hidden; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    #globe-container { width: 100vw; height: 100vh; }

    /* Title */
    .title-overlay {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      z-index: 10; text-align: center; pointer-events: none;
    }
    .title-overlay h1 {
      font-size: 26px; font-weight: 700; color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      letter-spacing: 2px;
    }
    .title-overlay p {
      font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px;
    }

    /* Tooltip */
    .tooltip {
      position: fixed; z-index: 100;
      background: rgba(10,14,26,0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 14px 18px;
      color: #fff; font-size: 13px;
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s; max-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .tooltip.visible { opacity: 1; }
    .tooltip .country { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .tooltip .gdp { font-size: 14px; color: #50e3c2; font-weight: 600; }
    .tooltip .rank { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .tooltip .gdp-change { font-size: 11px; margin-top: 2px; }

    /* Legend */
    .legend {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; align-items: center; gap: 12px;
      background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
      padding: 10px 20px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.6); font-size: 11px; }
    .legend-gradient { width: 120px; height: 8px; border-radius: 4px; background: linear-gradient(to right, #ff6b35, #f7c948, #50e3c2, #4a90d9); }
    .legend-label { color: rgba(255,255,255,0.35); font-size: 10px; }

    /* Side panel for BSH suppliers */
    .bsh-panel {
      position: fixed; right: 16px; bottom: 80px;
      z-index: 10;
      background: rgba(10,14,26,0.88); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;
      padding: 14px 16px; min-width: 140px;
    }
    .bsh-panel h4 { color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }
    .bsh-panel .tag {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600; margin: 2px 3px;
    }
  </style>
</head>
<body>

<div id="globe-container"></div>

<div class="title-overlay">
  <h1>🌍 全球 GDP · 3D 地球仪</h1>
  <p>点击任意国家查看 GDP 数据 ｜ 灰色 = 数据暂缺 ｜ 2024 年数据</p>

<!-- BSH Suppliers toggle -->

const gdpMap = {};
gdpData.forEach(d => { gdpMap[d.code] = d; });

// =============================================
//  BSH Supplier markers
// =============================================
const bshSuppliers = [
  { name: '加西贝拉', lat: 30.77, lng: 120.75, amount: '¥5,280万', color: '#5b9cf5' },
  { name: '宝钢', lat: 31.41, lng: 121.38, amount: '¥9,810万', color: '#f5a623' },

  { name: '英飞凌', lat: 31.23, lng: 121.47, amount: '¥2,280万', color: '#5b9cf5' },

  { name: '奥美', lat: 39.91, lng: 116.46, amount: '¥800万', color: '#e8505f' },
  { name: '顺丰', lat: 22.54, lng: 114.06, amount: '¥405万', color: '#7ed321' },

];

// =============================================
//  Globe
// =============================================
const elem = document.getElementById('globe-container');
const tooltip = document.getElementById('tooltip');
const tipCountry = document.getElementById('tipCountry');
const tipGDP = document.getElementById('tipGDP');
const tipRank = document.getElementById('tipRank');
const tipChange = document.getElementById('tipChange');

const myGlobe = Globe()
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
  .polygonCapColor((feat) => {
    const code = feat.properties.ISO_A3;
    const data = gdpMap[code];
    if (!data) return 'rgba(255,255,255,0.04)'; // no data - dim
    // Color gradient: red (low) -> yellow -> cyan -> blue (high)
    const maxGdp = 28781000; // USA
    const ratio = Math.log10(data.gdp) / Math.log10(maxGdp); // 0.77 to 1.0 range
    const t = (ratio - 0.77) / 0.23; // normalize to 0-1
    const r = Math.round(255 * (1 - t));
    const g = Math.round(200 + 55 * t);
    const b = Math.round(100 + 155 * t);
    return `rgb(${r},${g},${b})`;
  })
  .polygonSideColor(() => 'rgba(255,255,255,0.02)')
  .polygonStrokeColor(() => 'rgba(255,255,255,0.06)')
  .polygonAltitude(() => 0.005)
  .polygonLabel((feat) => {
    const code = feat.properties.ISO_A3;
    const data = gdpMap[code];
    const name = feat.properties.NAME || code;
    if (!data) return `<b>${name}</b><br>GDP: 数据暂缺`;
    return `<b>${name}</b><br>GDP: $${(data.gdp / 10000).toFixed(2)}万亿<br>排名: #${data.rank} | 增长: ${data.change}`;
  })
  .onPolygonHover((feat) => {
    if (!feat) {
      tooltip.classList.remove('visible');
      return;
    }
    const code = feat.properties.ISO_A3;
    const data = gdpMap[code];
    const name = feat.properties.NAME || code;
    if (data) {
      tipCountry.textContent = name;
      tipGDP.textContent = `$${(data.gdp / 10000).toFixed(2)} 万亿 USD`;
      tipRank.textContent = `全球第 ${data.rank} 位`;
      tipChange.textContent = `同比增长 ${data.change}`;
      tipChange.style.color = data.change.startsWith('+') ? '#50e3c2' : '#e8505f';
    } else {
      tipCountry.textContent = name;
      tipGDP.textContent = 'GDP 数据暂缺';
      tipRank.textContent = '';
      tipChange.textContent = '';
    }
    tooltip.style.left = '50%';
    tooltip.style.top = '40%';
    tooltip.style.transform = 'translateX(-50%)';
    tooltip.classList.add('visible');
  })
  .polygonsTransitionDuration(800)
  .polygonMergeMode(true);

// Load country polygons
fetch('//unpkg.com/globe.gl@2.34.0/example/data/ne_110m_land.json')
  .then(res => res.json())
  .then(landData => {
    // Convert to GeoJSON FeatureCollection
    const features = landData.features.map(f => ({
      type: 'Feature',
      properties: { ISO_A3: f.properties?.ISO_A3 || f.properties?.ADM0_A3 || '???', NAME: f.properties?.NAME || '' },
      geometry: f.geometry
    }));
    myGlobe.polygonsData({ type: 'FeatureCollection', features });
  });

// BSH supplier points
myGlobe
  .pointsData(bshSuppliers)
  .pointLat(d => d.lat)
  .pointLng(d => d.lng)
  .pointColor(d => d.color)
  .pointAltitude(0.02)
  .pointRadius(0.15)
  .pointLabel(d => `${d.name}<br>付款金额: ${d.amount}`)
  .pointMerge(false);

myGlobe(elem);

// Auto-rotate
let isIdle = true;
myGlobe.controls().autoRotate = true;
myGlobe.controls().autoRotateSpeed = 0.5;

document.addEventListener('mousedown', () => {
  myGlobe.controls().autoRotate = false;
});
document.addEventListener('mouseup', () => {
  setTimeout(() => { myGlobe.controls().autoRotate = true; }, 3000);
});

// Resize
window.addEventListener('resize', () => myGlobe(elem));

console.log('🌍 Globe loaded!');
</script>

</html>
