<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能付款查询系统 · PayFlow AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --primary-light: #60a5fa;
  --accent: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --bg: #f1f5f9;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== HEADER ===== */
.header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: white;
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 20;
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}
.header-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.header-info { flex: 1; min-width: 0; }
.header-info h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
.header-info .sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.badge {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  background: rgba(16,185,129,0.15);
  color: #34d399;
  border: 1px solid rgba(16,185,129,0.2);
}
.badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #34d399;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== LAYOUT ===== */
.main-layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
}
.sidebar-stats {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.stat-row .label { color: var(--text2); }
.stat-row .value { font-weight: 600; }
.stat-row .value.green { color: var(--success); }
.stat-row .value.red { color: var(--danger); }
.stat-row .value.blue { color: var(--primary); }
.stat-row .value.amber { color: var(--warning); }

.sidebar-suggestions {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
}
.sidebar-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.suggestion-card {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
}
.suggestion-card:hover {
  border-color: var(--primary-light);
  background: #eff6ff;
  color: var(--primary);
  transform: translateX(3px);
}
.suggestion-card .icon { font-size: 16px; }

/* ===== CHAT AREA ===== */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  scroll-behavior: smooth;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

/* Messages */
.msg { margin-bottom: 20px; animation: msgIn 0.3s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg-user {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.msg-user .bubble {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 12px 18px;
  border-radius: 18px 18px 4px 18px;
  max-width: 560px;
  font-size: 14px;
  line-height: 1.5;
  box-shadow: 0 2px 8px rgba(37,99,235,0.2);
}
.msg-user .avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.msg-assistant {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.msg-assistant .avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1e293b, #334155);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.msg-assistant .bubble {
  background: white;
  padding: 16px 20px;
  border-radius: 18px 18px 18px 4px;
  max-width: 640px;
  font-size: 14px;
  line-height: 1.6;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  border: 1px solid #f1f5f9;
}

.msg-loading .bubble {
  background: white;
  padding: 16px 20px;
  border-radius: 18px 18px 18px 4px;
  border: 1px solid #f1f5f9;
}
.typing {
  display: flex;
  gap: 4px;
  padding: 4px 0;
}
.typing span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text3);
  animation: typing 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%,60%,100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Result table */
.result-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}
.result-table th {
  background: #f8fafc;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  color: var(--text2);
  font-size: 12px;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.result-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #f1f5f9;
  color: var(--text);
}
.result-table tr:hover { background: #f8fafc; }

.status-tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.status-tag.paid { background: #d1fae5; color: #065f46; }
.status-tag.pending { background: #fef3c7; color: #92400e; }
.status-tag.overdue { background: #fee2e2; color: #991b1b; }
.status-tag.review { background: #dbeafe; color: #1e40af; }

.summary-box {
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 13px;
  color: var(--text2);
}

.sql-hint {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: #1e293b;
  color: #e2e8f0;
  border-radius: 6px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.sql-hint:hover { background: #334155; }

.welcome-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.welcome-msg .big-icon { font-size: 56px; margin-bottom: 16px; }
.welcome-msg h2 { font-size: 20px; color: var(--text); margin-bottom: 8px; }
.welcome-msg p { font-size: 14px; max-width: 360px; margin: 0 auto; line-height: 1.6; }

/* ===== INPUT ===== */
.input-area {
  padding: 16px 24px 20px;
  background: white;
  border-top: 1px solid var(--border);
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.input-row textarea {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  resize: none;
  min-height: 48px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--bg);
}
.input-row textarea:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  background: white;
}
.input-row textarea::placeholder { color: var(--text3); }

.btn-send {
  width: 48px; height: 48px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.btn-send:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

.input-footer {
  max-width: 800px;
  margin: 8px auto 0;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text3);
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .chat-area { padding: 16px; }
  .input-area { padding: 12px 16px 16px; }
  .header { padding: 12px 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">PF</div>
  <div class="header-info">
    <h1>智能付款查询系统</h1>
    <div class="sub">AI 驱动的供应商付款查询平台</div>
  </div>
  <div class="header-actions">
    <div class="badge"><span class="dot"></span> DeepSeek AI 在线</div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">📊 数据概览</div>
    <div class="sidebar-stats" id="statsPanel">
      <div class="stat-row"><span class="label">总笔数</span><span class="value blue" id="statTotal">-</span></div>
      <div class="stat-row"><span class="label">总金额</span><span class="value blue" id="statAmount">-</span></div>
      <div class="stat-row"><span class="label">已付款</span><span class="value green" id="statPaid">-</span></div>
      <div class="stat-row"><span class="label">待处理</span><span class="value amber" id="statPending">-</span></div>
      <div class="stat-row"><span class="label">已逾期</span><span class="value red" id="statOverdue">-</span></div>
    </div>
    <div class="sidebar-suggestions">
      <div class="sidebar-label">💡 快捷查询</div>
      <div class="suggestion-card" onclick="ask('华为的付款有哪些？')"><span class="icon">🏢</span> 华为的付款有哪些？</div>
      <div class="suggestion-card" onclick="ask('已逾期的付款')"><span class="icon">⚠️</span> 已逾期的付款</div>
      <div class="suggestion-card" onclick="ask('金额超过10万的付款')"><span class="icon">💰</span> 金额超过10万的付款</div>
      <div class="suggestion-card" onclick="ask('IT部门申请的付款')"><span class="icon">👨‍💻</span> IT部门申请的付款</div>
      <div class="suggestion-card" onclick="ask('本月的付款统计')"><span class="icon">📈</span> 本月的付款统计</div>
      <div class="suggestion-card" onclick="ask('所有待审批的付款')"><span class="icon">⏳</span> 所有待审批的付款</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="chat-area" id="chatArea">
      <div class="welcome-msg">
        <div class="big-icon">🤖</div>
        <h2>有什么可以帮您？</h2>
        <p>输入中文查询供应商付款信息，AI 自动理解您的需求</p>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="输入查询，例如「华为的付款有哪些？」" onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="doSend()">➤</button>
      </div>
      <div class="input-footer">
        <span>💡 支持供应商、金额、日期、状态等组合查询</span>
        <span>由 DeepSeek AI 驱动</span>
      </div>
    </div>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// Auto-resize input
input.addEventListener('input', () => {
  input.style.height = '44px';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
}

function addMessage(html, type) {
  const div = document.createElement('div');
  div.className = 'msg';
  
  if (type === 'user') {
    div.innerHTML = `<div class="msg-user"><div class="bubble">${html}</div><div class="avatar">👤</div></div>`;
  } else if (type === 'assistant') {
    div.innerHTML = `<div class="msg-assistant"><div class="avatar">AI</div><div class="bubble">${html}</div></div>`;
  } else if (type === 'error') {
    div.innerHTML = `<div class="msg-assistant"><div class="avatar">⚠️</div><div class="bubble" style="color:var(--danger)">${html}</div></div>`;
  }
  
  // Remove welcome if exists
  const welcome = chatArea.querySelector('.welcome-msg');
  if (welcome) welcome.remove();
  
  // Remove loading
  removeLoading();
  
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addLoading() {
  removeLoading();
  const div = document.createElement('div');
  div.className = 'msg msg-loading';
  div.id = 'loadingMsg';
  div.innerHTML = `<div class="msg-assistant"><div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function ask(q) {
  input.value = q;
  input.style.height = '44px';
  doSend();
}

async function doSend() {
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(escapeHtml(text), 'user');
  input.value = '';
  input.style.height = '44px';
  sendBtn.disabled = true;
  addLoading();
  
  try {
    const resp = await fetch('/api/v1/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: text, top_k: 50 }),
    });
    const data = await resp.json();
    removeLoading();
    
    if (data.error) {
      addMessage(`❌ ${escapeHtml(data.error)}`, 'error');
    } else {
      addMessage(formatResult(data));
    }
  } catch (err) {
    removeLoading();
    addMessage(`❌ 网络错误: ${escapeHtml(err.message)}`, 'error');
  }
  
  sendBtn.disabled = false;
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatResult(data) {
  let html = '';
  
  // Summary
  if (data.summary) {
    html += `<div class="summary-box">📌 ${escapeHtml(data.summary)}</div>`;
  }
  
  // Explanation
  if (data.explanation && !data.summary?.includes(data.explanation)) {
    html += `<div style="font-size:13px;color:var(--text2);margin-bottom:10px;">🔍 ${escapeHtml(data.explanation)}</div>`;
  }
  
  // Data table
  if (data.data && data.data.length > 0) {
    const keys = Object.keys(data.data[0]);
    // Filter out id and full name if having short name
    const displayKeys = keys.filter(k => !k.includes('编号') && !k.includes('id'));
    
    // Use specific columns for table
    const columns = ['付款编号', '供应商简称', '供应商名称', '费用类型', '付款金额', '付款状态', '付款到期日', '申请部门'];
    const actualCols = columns.filter(c => keys.includes(c));
    
    html += `<table class="result-table"><thead><tr>`;
    actualCols.forEach(col => {
      html += `<th>${col}</th>`;
    });
    html += `</tr></thead><tbody>`;
    
    data.data.forEach(row => {
      html += `<tr>`;
      actualCols.forEach(col => {
        let val = row[col];
        if (col === '付款状态') {
          const cls = val === '已付款' ? 'paid' : val === '已逾期' ? 'overdue' : val === '待审批' || val === '审批中' ? 'pending' : 'review';
          val = `<span class="status-tag ${cls}">${escapeHtml(String(val))}</span>`;
        } else if (col === '付款金额') {
          val = `¥${Number(val).toLocaleString()}`;
        } else {
          val = escapeHtml(String(val || '-'));
        }
        html += `<td>${val}</td>`;
      });
      html += `</tr>`;
    });
    
    html += `</tbody></table>`;
    
    // SQL hint
    if (data.sql) {
      html += `<div class="sql-hint" onclick="copySql(this)" title="点击复制SQL">📋 查看查询SQL ›</div>`;
    }
    
    html += `<div style="font-size:12px;color:var(--text3);margin-top:8px;">共 ${data.data.length} 条记录</div>`;
  } else if (data.data && data.data.length === 0) {
    html += `<div style="padding:20px;text-align:center;color:var(--text3);">📭 没有找到匹配的记录</div>`;
  }
  
  return html;
}

function copySql(el) {
  // Find SQL text from data
  alert('SQL 已生成，查看控制台');
}

// Load stats on startup
async function loadStats() {
  try {
    const resp = await fetch('/api/v1/stats');
    const data = await resp.json();
    document.getElementById('statTotal').textContent = data.总笔数 || 0;
    document.getElementById('statAmount').textContent = data.总金额 ? `¥${(data.总金额/10000).toFixed(1)}万` : '-';
    document.getElementById('statPaid').textContent = data.已付款笔数 || 0;
    document.getElementById('statPending').textContent = data.待处理笔数 || 0;
    document.getElementById('statOverdue').textContent = data.已逾期笔数 || 0;
  } catch(e) {
    // stats not critical
  }
}
loadStats();
</script>
</body>
</html>
