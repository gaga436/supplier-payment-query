<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博西家电供应商付款查询系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a56db;--primary-light:#e8eefb;--primary-dark:#0f3a8e;
  --bg:#f0f4f8;--card:#fff;--border:#d1d9e6;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --success:#059669;--warn:#d97706;--danger:#dc2626;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;position:sticky;top:0;z-index:100}
.header .logo{font-weight:700;font-size:17px;color:var(--primary);display:flex;align-items:center;gap:8px}
.header .logo img{width:24px;height:24px}
.header .logo span{color:var(--text);font-weight:400}
.header .tabs{margin-left:auto;display:flex;gap:2px}
.header .tabs a{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;text-decoration:none;color:var(--text2);transition:.15s;cursor:pointer}
.header .tabs a.active,.header .tabs a:hover{background:var(--primary-light);color:var(--primary)}
.header .badge{padding:3px 10px;border-radius:100px;background:var(--primary);color:#fff;font-size:11px;font-weight:600;margin-left:12px}

/* ── Content ── */
.tab{display:none;padding:24px;max-width:1100px;margin:0 auto}
.tab.active{display:block}

/* ── Search ── */
.search-box{background:var(--card);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);margin-bottom:16px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:6px;font-size:14px;outline:none;color:var(--text);background:#fff;transition:.15s}
.search-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
.search-row input::placeholder{color:var(--text3)}
.search-row button{padding:10px 24px;background:var(--primary);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s}
.search-row button:hover{background:var(--primary-dark)}
.suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.suggestions a{padding:4px 12px;border-radius:100px;font-size:12px;color:var(--text2);text-decoration:none;background:var(--bg);transition:.15s;cursor:pointer}
.suggestions a:hover{background:var(--primary-light);color:var(--primary)}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:24px;font-weight:700}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:2px}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h3{font-size:14px;color:var(--text2);margin-bottom:12px;font-weight:600}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);font-size:12px;white-space:nowrap}
tbody td{padding:8px 10px;border-bottom:1px solid #f1f5f9;font-size:13px}
tbody tr:hover{background:#f8fafc}
.tag{padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.tag.paid{background:#ecfdf5;color:var(--success)}
.tag.pending{background:#fffbeb;color:var(--warn)}
.tag.overdue{background:#fef2f2;color:var(--danger)}
.amt{font-weight:600;text-align:right;white-space:nowrap}

/* ── Dashboard Grid ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:800px){.dash-grid{grid-template-columns:1fr}}

/* ── Status bar ── */
.status-bar{display:flex;height:28px;border-radius:6px;overflow:hidden;margin-bottom:12px;font-size:11px;font-weight:600}
.status-bar div{display:flex;align-items:center;justify-content:center;color:#fff;transition:.5s}

/* ── Supplier bar ── */
.supplier-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.supplier-row+.bar-track{margin-bottom:6px}
.bar-track{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.bar-track div{height:100%;border-radius:3px;transition:1s}

/* ── Dept grid ── */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.dept-item{background:var(--bg);border-radius:6px;padding:10px;text-align:center}
.dept-item .v{font-size:16px;font-weight:700;line-height:1.3}
.dept-item .l{font-size:11px;color:var(--text2);margin-top:2px}

/* ── Presentation ── */
.preso{max-width:900px;margin:0 auto;text-align:center;padding:20px}
.preso h1{font-size:28px;font-weight:700;margin-bottom:4px}
.preso h1 small{font-weight:400;font-size:16px;color:var(--text2)}
.preso .sub{color:var(--text2);font-size:14px;margin-bottom:20px}
.preso .hero-card{background:linear-gradient(135deg,var(--primary),#2563eb);border-radius:var(--radius);padding:36px;color:#fff;margin-bottom:20px}
.preso .hero-card .huge{font-size:52px;font-weight:800}
.preso .hero-card .hlbl{font-size:16px;opacity:.8;margin-top:4px}

/* ── Loading ── */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Highlight ── */
mark{background:#fef3c7;padding:0 2px;border-radius:2px}
</style>
</head>
<body>

    <div class="hero-card">

      💡 本页为演示版，数据基于博西家电公开信息生成 · <a href="http://43.156.67.190:18000" target="_blank" style="color:var(--primary)">访问线上版</a>

</div>

<script>
// ═══════════════════════════════════════
// DATA
// ═══════════════════════════════════════
const PAYMENTS = [

  {id:"BSH-006",s:"英飞凌",sn:"英飞凌科技（中国）有限公司",d:"采购部",f:"功率器件采购",a:6800000,st:"已付款",due:"2026-03-30"},
  {id:"BSH-007",s:"英飞凌",sn:"英飞凌科技（中国）有限公司",d:"采购部",f:"智能传感器",a:3500000,st:"已付款",due:"2026-04-10"},
  {id:"BSH-008",s:"巴斯夫",sn:"巴斯夫（中国）有限公司",d:"采购部",f:"保温材料采购",a:12800000,st:"已付款",due:"2026-05-25"},
  {id:"BSH-009",s:"巴斯夫",sn:"巴斯夫（中国）有限公司",d:"采购部",f:"聚氨酯原料",a:9500000,st:"待审批",due:"2026-07-10"},
  {id:"BSH-010",s:"SAP",sn:"SAP（中国）有限公司",d:"IT部",f:"ERP许可费",a:6800000,st:"已付款",due:"2026-04-01"},
  {id:"BSH-011",s:"SAP",sn:"SAP（中国）有限公司",d:"IT部",f:"系统维护费",a:2200000,st:"待审批",due:"2026-07-01"},
  {id:"BSH-012",s:"德迅",sn:"德迅中国货运有限公司",d:"供应链部",f:"欧洲海运",a:9600000,st:"已付款",due:"2026-02-28"},
  {id:"BSH-013",s:"德迅",sn:"德迅中国货运有限公司",d:"供应链部",f:"铁路运输",a:7800000,st:"审批中",due:"2026-06-30"},
  {id:"BSH-014",s:"德迅",sn:"德迅中国货运有限公司",d:"供应链部",f:"出口海运",a:4500000,st:"已逾期",due:"2025-12-15"},
  {id:"BSH-015",s:"京东",sn:"京东家电",d:"市场部",f:"渠道返利",a:3500000,st:"已付款",due:"2026-03-31"},
  {id:"BSH-016",s:"京东",sn:"京东家电",d:"市场部",f:"线上推广费",a:5200000,st:"审批中",due:"2026-06-20"},
  {id:"BSH-017",s:"苏宁",sn:"苏宁易购集团股份有限公司",d:"市场部",f:"渠道推广费",a:2800000,st:"已付款",due:"2026-04-15"},
  {id:"BSH-018",s:"苏宁",sn:"苏宁易购集团股份有限公司",d:"市场部",f:"促销活动费",a:1800000,st:"已逾期",due:"2026-01-15"},
  {id:"BSH-019",s:"顺丰",sn:"顺丰速运有限公司",d:"售后部",f:"物流配送",a:1850000,st:"已付款",due:"2026-05-10"},
  {id:"BSH-020",s:"顺丰",sn:"顺丰速运有限公司",d:"售后部",f:"逆向物流",a:2200000,st:"已逾期",due:"2026-02-10"},
  {id:"BSH-021",s:"奥美",sn:"奥美整合行销集团",d:"市场部",f:"品牌推广",a:4200000,st:"已付款",due:"2026-03-20"},
  {id:"BSH-022",s:"奥美",sn:"奥美整合行销集团",d:"市场部",f:"新品发布策划",a:3800000,st:"待审批",due:"2026-08-01"},
  {id:"BSH-023",s:"宁华",sn:"南京宁华供应链管理有限公司",d:"供应链部",f:"仓储服务",a:980000,st:"已付款",due:"2026-04-30"},
  {id:"BSH-024",s:"宁华",sn:"南京宁华供应链管理有限公司",d:"供应链部",f:"清关服务",a:1120000,st:"审批中",due:"2026-07-15"},
  {id:"BSH-025",s:"加西贝拉",sn:"加西贝拉压缩机有限公司",d:"采购部",f:"压缩机备件",a:18300000,st:"待审批",due:"2026-08-15"},
  {id:"BSH-026",s:"加西贝拉",sn:"加西贝拉压缩机有限公司",d:"采购部",f:"年度框架协议尾款",a:8900000,st:"已逾期",due:"2026-01-20"},
  {id:"BSH-027",s:"宝钢",sn:"宝山钢铁股份有限公司",d:"采购部",f:"不锈钢采购",a:45800000,st:"已付款",due:"2026-01-31"},
];

// ═══════════════════════════════════════
// SMART SEARCH ENGINE
// ═══════════════════════════════════════
function fm(n){return '¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:0})}

function search(q){
  document.getElementById('searchInput').value=q;
  doSearch();
}

function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q){showResult(PAYMENTS,q,true);return;}
  
  const results=smartSearch(q);
  showResult(results,q);
}

function smartSearch(q){
  const s=q.toLowerCase().trim();
  let results=PAYMENTS;

  // ── Status filter ──
  if(/逾期|过期|超期/.test(s)) results=results.filter(p=>p.st==='已逾期');
  else if(/(已付|已付款|已支付)/.test(s)) results=results.filter(p=>p.st==='已付款');
  else if(/待批|审批中|待审批/.test(s)) results=results.filter(p=>p.st==='待审批'||p.st==='审批中');

  // ── Supplier filter ──
  const suppliers=[...new Set(PAYMENTS.map(p=>p.s))];
  for(const sup of suppliers){
    if(s.includes(sup.toLowerCase())||s.includes(sup)){
      results=results.filter(p=>p.s===sup);
      break;
    }
  }

  // ── Department filter ──
  const deptMap={'采购':'采购部','it':'IT部','it部':'IT部','研发':'研发部','市场':'市场部','供应链':'供应链部','售后':'售后部','生产':'生产部'};
  for(const [kw,dept] of Object.entries(deptMap)){
    if(s.includes(kw)){results=results.filter(p=>p.d===dept);break;}
  }

  // ── Amount range ──
  const gt=s.match(/(大于|超过|>|高于|以上)(\d+[万]?)/);
  if(gt){
    const v=gt[2].includes('万')?parseFloat(gt[2])*10000:parseFloat(gt[2]);
    results=results.filter(p=>p.a>v);
  }
  const lt=s.match(/(小于|低于|<|不超过|以下)(\d+[万]?)/);
  if(lt){
    const v=lt[2].includes('万')?parseFloat(lt[2])*10000:parseFloat(lt[2]);
    results=results.filter(p=>p.a<v);
  }
  const bt=s.match(/(\d+[万]?)\s*(?:~|-|到|至)\s*(\d+[万]?)/);
  if(bt){
    const lo=bt[1].includes('万')?parseFloat(bt[1])*10000:parseFloat(bt[1]);
    const hi=bt[2].includes('万')?parseFloat(bt[2])*10000:parseFloat(bt[2]);
    results=results.filter(p=>p.a>=lo&&p.a<=hi);
  }

  // ── Fee type ──
  if(/(采购|采购费|原材料)/.test(s)) results=results.filter(p=>p.d==='采购部');
  if(/(物流|运输|仓储|清关|配送)/.test(s)) results=results.filter(p=>p.d==='供应链部'||p.d==='售后部');
  if(/(推广|广告|促销|品牌|策划)/.test(s)) results=results.filter(p=>p.d==='市场部');

  // ── Simple text match (last resort) ──
  if(results.length===PAYMENTS.length){
    results=PAYMENTS.filter(p=>
      p.s.includes(q)||
      p.sn.includes(q)||
      p.d.includes(q)||
      p.f.includes(q)||
      p.st.includes(q)||
      p.id.toLowerCase().includes(s)
    );
  }

  return results;
}

function showResult(results,q,isDefault){
  const div=document.getElementById('searchResult');
  const total=results.reduce((s,p)=>s+p.a,0);
  const count=results.length;

  let html='';

  if(isDefault||results.length===PAYMENTS.length&&!q){
    // Show dashboard stats by default
    renderMiniDashboard(html,div);
    return;
  }

  // Summary
  const statuses=[...new Set(results.map(p=>p.st))];
  const names=[...new Set(results.map(p=>p.s))];
  let summary=`<div class="card" style="padding:12px 16px;font-size:14px;color:var(--text2)">`;
  summary+=`共查询到 <strong style="color:var(--text)">${count}</strong> 条记录`;
  if(names.length<=5) summary+=`，涉及 <strong style="color:var(--primary))">${names.join('、')}</strong>`;
  summary+=`，合计 <strong style="color:var(--primary)">${fm(total)}</strong>`;
  if(statuses.length&&statuses.length<3) summary+=`，状态：${statuses.join('、')}`;
  summary+=`</div>`;
  html+=summary;

  if(!count){
    html+=`<div class="card" style="padding:40px;text-align:center;color:var(--text3)">
      😅 没有找到匹配的记录。试试搜索：<br><br>
      <span style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        <a onclick="search('加西贝拉')" style="color:var(--primary);cursor:pointer">加西贝拉</a>
        <a onclick="search('宝钢')" style="color:var(--primary);cursor:pointer">宝钢</a>
        <a onclick="search('IT部')" style="color:var(--primary);cursor:pointer">IT部</a>
        <a onclick="search('已逾期')" style="color:var(--primary);cursor:pointer">已逾期</a>
        <a onclick="search('总额')" style="color:var(--primary);cursor:pointer">总额</a>
        <a onclick="search('大于500万')" style="color:var(--primary);cursor:pointer">大于500万</a>
      </span>
    </div>`;
    div.innerHTML=html;
    return;
  }

  // Table
  html+=`<div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table>
    <thead><tr>
      <th>编号</th><th>供应商</th><th>金额</th><th>状态</th><th>部门</th><th>费用类型</th><th>到期日</th>
    </tr></thead>
    <tbody>${results.map(p=>`<tr>
      <td style="color:var(--text3);font-size:12px">${p.id}</td>
      <td><strong>${p.s}</strong></td>
      <td class="amt">${fm(p.a)}</td>
      <td><span class="tag ${p.st==='已付款'?'paid':p.st==='已逾期'?'overdue':'pending'}">${p.st}</span></td>
      <td>${p.d}</td>
      <td style="color:var(--text2)">${p.f}</td>
      <td style="color:var(--text3);font-size:12px">${p.due}</td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;

  div.innerHTML=html;
}

function renderMiniDashboard(html,div){
  const total=PAYMENTS.reduce((s,p)=>s+p.a,0);
  const paid=PAYMENTS.filter(p=>p.st==='已付款').length;
  const pending=PAYMENTS.filter(p=>p.st==='待审批'||p.st==='审批中').length;
  const overdue=PAYMENTS.filter(p=>p.st==='已逾期').length;

  html=`<div class="stats-row">
    <div class="stat-card"><div class="num" style="color:var(--primary)">${fm(total)}</div><div class="lbl">总金额</div></div>
    <div class="stat-card"><div class="num" style="color:var(--primary)">${PAYMENTS.length}</div><div class="lbl">总笔数</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${paid}</div><div class="lbl">✅ 已付款</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warn)">${pending}</div><div class="lbl">⏳ 待处理</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${overdue}</div><div class="lbl">⚠️ 已逾期</div></div>
  </div>
  <div class="card"><h3>🔍 输入关键词开始查询</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${['加西贝拉','宝钢','IT部','已逾期','总额','大于500万'].map(t=>`<a onclick="search('${t}')" style="padding:6px 14px;border-radius:6px;background:var(--bg);font-size:13px;color:var(--text2);cursor:pointer;text-decoration:none">${t}</a>`).join('')}
    </div>
  </div>`;
  div.innerHTML=html;
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function renderDashboard(){
  const total=PAYMENTS.reduce((s,p)=>s+p.a,0);
  const paid=PAYMENTS.filter(p=>p.st==='已付款');
  const pending=PAYMENTS.filter(p=>p.st==='待审批'||p.st==='审批中');
  const overdue=PAYMENTS.filter(p=>p.st==='已逾期');
  const paidAmt=paid.reduce((s,p)=>s+p.a,0);
  const pendingAmt=pending.reduce((s,p)=>s+p.a,0);
  const overdueAmt=overdue.reduce((s,p)=>s+p.a,0);
  const maxAmt=Math.max(total,1);

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="num" style="color:var(--primary)">${fm(total)}</div><div class="lbl">总金额</div></div>
    <div class="stat-card"><div class="num" style="color:var(--primary)">${PAYMENTS.length}笔</div><div class="lbl">总笔数</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${paid.length}笔</div><div class="lbl">已付款</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warn)">${pending.length}笔</div><div class="lbl">待处理</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${overdue.length}笔</div><div class="lbl">已逾期</div></div>
  `;

  document.getElementById('statusBar').innerHTML=`
    <div style="flex:${paidAmt/maxAmt*100};background:var(--success)">${paid.length}笔 ${fm(paidAmt)}</div>
    <div style="flex:${pendingAmt/maxAmt*100};background:var(--warn)">${pending.length}笔 ${fm(pendingAmt)}</div>
    <div style="flex:${overdueAmt/maxAmt*100};background:var(--danger)">${overdue.length}笔 ${fm(overdueAmt)}</div>
  `.replace(/flex:0[^;]*/g,'flex:0.01');

  document.getElementById('statusDetail').innerHTML=`
    <div class="supplier-row"><span>✅ 已付款</span><span style="color:var(--success)">${paid.length}笔 ${fm(paidAmt)}</span></div>
    <div class="supplier-row"><span>⏳ 待处理</span><span style="color:var(--warn)">${pending.length}笔 ${fm(pendingAmt)}</span></div>
    <div class="supplier-row"><span>⚠️ 已逾期</span><span style="color:var(--danger)">${overdue.length}笔 ${fm(overdueAmt)}</span></div>
  `;

  // Top suppliers
  const byS={};
  PAYMENTS.forEach(p=>{if(!byS[p.s])byS[p.s]={n:p.s,c:0,a:0};byS[p.s].c++;byS[p.s].a+=p.a});
  const topS=Object.values(byS).sort((a,b)=>b.a-a.a).slice(0,10);
  const maxS=topS[0]?.a||1;
  document.getElementById('topSuppliers').innerHTML=topS.map(s=>`
    <div class="supplier-row"><span>${s.n}</span><span style="color:var(--primary);font-weight:600">${fm(s.a)}</span></div>
    <div class="bar-track"><div style="width:${s.a/maxS*100}%;background:var(--primary)"></div></div>
  `).join('');

  // Department breakdown
  const byD={};
  PAYMENTS.forEach(p=>{byD[p.d]=(byD[p.d]||0)+p.a});
  const dClr=['#1a56db','#2563eb','#3b82f6','#60a5fa','#93c5fd','#bfdbfe'];
  document.getElementById('deptGrid').innerHTML=Object.entries(byD).map(([k,v],i)=>`
    <div class="dept-item"><div class="v" style="color:${dClr[i%dClr.length]}">${fm(v)}</div><div class="l">${k}</div></div>
  `).join('');

  // Fee breakdown
  const byF={};
  PAYMENTS.forEach(p=>{byF[p.f]=(byF[p.f]||0)+p.a});
  const topF=Object.entries(byF).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('feeGrid').innerHTML=topF.map(([k,v],i)=>`
    <div class="dept-item"><div class="v" style="color:${dClr[i%dClr.length]}">${fm(v)}</div><div class="l">${k.length>6?k.slice(0,6)+'…':k}</div></div>
  `).join('');
}

// ═══════════════════════════════════════
// PRESENTATION
// ═══════════════════════════════════════
function renderPresentation(){
  const total=PAYMENTS.reduce((s,p)=>s+p.a,0);
  const paid=PAYMENTS.filter(p=>p.st==='已付款').length;
  const pending=PAYMENTS.filter(p=>p.st==='待审批'||p.st==='审批中').length;
  const overdue=PAYMENTS.filter(p=>p.st==='已逾期').length;

  document.getElementById('presoTotal').textContent=fm(total);
  document.getElementById('presoStats').innerHTML=`
    <div class="stat-card"><div class="num" style="color:var(--primary)">${PAYMENTS.length}</div><div class="lbl">总笔数</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${paid}</div><div class="lbl">已付款</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warn)">${pending}</div><div class="lbl">待处理</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${overdue}</div><div class="lbl">已逾期</div></div>
  `;

  const byS={};
  PAYMENTS.forEach(p=>{if(!byS[p.s])byS[p.s]={n:p.s,c:0,a:0};byS[p.s].c++;byS[p.s].a+=p.a});
  const topS=Object.values(byS).sort((a,b)=>b.a-a.a).slice(0,10);
  document.getElementById('presoSuppliers').innerHTML=topS.map(s=>
    `<div class="supplier-row"><span>${s.n}（${s.c}笔）</span><span style="color:var(--warn);font-weight:600">${fm(s.a)}</span></div>`
  ).join('');

  const byD={};
  PAYMENTS.forEach(p=>{byD[p.d]=(byD[p.d]||0)+p.a});
  document.getElementById('presoDepts').innerHTML=Object.entries(byD).map(([k,v])=>{
    const pct=(v/total*100).toFixed(1);
    return `<div class="supplier-row"><span>${k}</span><span style="color:var(--primary);font-weight:600">${pct}% ${fm(v)}</span></div><div class="bar-track"><div style="width:${pct*3}%;background:var(--primary)"></div></div>`;
  }).join('');
}

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tabs a').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  document.querySelector(`.tabs a[onclick*="'${n}'"]`).classList.add('active');
}

// Init
renderDashboard();
renderPresentation();
</script>
</body>
</html>
