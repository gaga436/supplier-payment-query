<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博西家电 · 供应商付款查询系统</title>
<style>
/* ── Reset & Base ── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#3b82f6;--accent2:#06b6d4;
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --radius:12px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::selection{background:var(--accent);color:#fff}
a{color:var(--accent2);text-decoration:none}
input,select,button{font-family:inherit}

/* ── Nav ── */
nav{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px;display:flex;align-items:center;height:56px;gap:16px}
nav .logo{font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px}
nav .logo span{color:var(--accent)}
nav .logo small{font-weight:400;font-size:12px;color:var(--text3)}
nav .tabs{display:flex;gap:4px;margin-left:auto}
nav .tabs button{padding:8px 18px;border:none;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--text2);transition:.2s}
nav .tabs button.active,.tabs button:hover{background:var(--accent);color:#fff}
nav .badge{padding:3px 10px;border-radius:100px;background:var(--accent2);color:#fff;font-size:11px;font-weight:600}

/* ── Tab Content ── */
.tab{display:none;padding:20px;max-width:1100px;margin:0 auto}
.tab.active{display:block}

/* ── Dashboard Tab ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:20px;text-align:center}
.stat-num{font-size:2rem;font-weight:800}
.stat-lbl{font-size:13px;color:var(--text2);margin-top:4px}
.stat-card.gold .stat-num{color:var(--warn)}
.stat-card.blue .stat-num{color:var(--accent)}
.stat-card.teal .stat-num{color:var(--accent2)}
.stat-card.green .stat-num{color:var(--success)}
.stat-card.red .stat-num{color:var(--danger)}

.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.dashboard-grid{grid-template-columns:1fr}}
.dash-card{background:var(--bg2);border-radius:var(--radius);padding:20px}
.dash-card h3{font-size:15px;color:var(--text2);margin-bottom:14px;font-weight:600}

.status-bar{border-radius:8px;overflow:hidden;margin-bottom:10px;display:flex;height:32px}
.status-bar div{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;transition:.5s}
.bar-paid{background:var(--success)}
.bar-pending{background:var(--warn)}
.bar-overdue{background:var(--danger)}

.supplier-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:6px;font-size:14px}
.supplier-bar:nth-child(odd){background:rgba(255,255,255,.03)}
.supplier-name{color:var(--text)}
.supplier-amt{font-weight:600}
.supplier-bar .bar-fill{height:6px;border-radius:3px;margin-top:4px;width:100%;background:var(--bg3);overflow:hidden}
.supplier-bar .bar-fill div{height:100%;border-radius:3px;transition:1s}

.dept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:10px}
.dept-item{background:rgba(59,130,246,.08);border-radius:var(--radius-sm);padding:12px;text-align:center}
.dept-item .dept-name{font-size:13px;color:var(--text2)}
.dept-item .dept-amt{font-size:18px;font-weight:700;margin-top:4px}

/* ── Chat Tab ── */
.chat-container{max-width:700px;margin:0 auto;display:flex;flex-direction:column;height:calc(100vh - 130px)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 0;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

.msg{display:flex;margin-bottom:14px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{justify-content:flex-end}
.msg.bot{justify-content:flex-start}
.msg .bubble{max-width:80%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
.msg.user .bubble{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px}
.msg.bot .bubble{background:var(--bg2);color:var(--text);border-radius:16px 16px 16px 4px;border:1px solid rgba(59,130,246,.15)}
.msg.bot .bubble .label{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:6px}

.chat-input{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--bg3);margin-top:auto}
.chat-input input{flex:1;padding:10px 16px;border-radius:100px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:14px;outline:none;transition:.2s}
.chat-input input:focus{border-color:var(--accent)}
.chat-input input::placeholder{color:var(--text3)}
.chat-input button{padding:10px 24px;border-radius:100px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:14px;transition:.2s;white-space:nowrap}
.chat-input button:hover{background:#2563eb}
.chat-input .suggestions{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chat-input .suggestions button{padding:5px 12px;border-radius:100px;border:1px solid var(--bg3);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:.2s}
.chat-input .suggestions button:hover{border-color:var(--accent);color:var(--accent)}

/* ── Table ── */
.results-table{width:100%;border-collapse:collapse;font-size:13px}
.results-table th{padding:8px 10px;text-align:left;color:var(--text2);border-bottom:1px solid var(--bg3);font-weight:600}
.results-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.tag{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.tag.paid{background:rgba(16,185,129,.15);color:var(--success)}
.tag.pending{background:rgba(245,158,11,.15);color:var(--warn)}
.tag.overdue{background:rgba(239,68,68,.15);color:var(--danger)}

/* ── Preso Tab ── */
.preso{text-align:center;padding:20px 0}
.preso h1{font-size:clamp(28px,5vw,52px);font-weight:800;margin-bottom:10px}
.preso h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.preso .sub{color:var(--text2);font-size:16px;margin-bottom:30px}
.preso-hero{background:var(--bg2);border-radius:var(--radius);padding:40px;margin-bottom:20px}
.preso-hero .big-num{font-size:clamp(40px,8vw,72px);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.preso-hero .big-lbl{color:var(--text2);font-size:18px;margin-top:8px}

/* ── Loading ── */
.spinner{width:20px;height:20px;border:2px solid var(--text2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  </div>
</div>

// ═══════════════════════════════════════════════
// Query Engine
// ═══════════════════════════════════════════════
function queryPayments(q){
  if(!q||!q.trim()) return PAYMENTS;
  const s=q.toLowerCase().trim();

  // Status filters
  if(/逾期/.test(s)) return PAYMENTS.filter(p=>p.status==='已逾期');
  if(/已付款/.test(s)||/已付/.test(s)) return PAYMENTS.filter(p=>p.status==='已付款');
  if(/待审批/.test(s)||/待处理/.test(s)||/审批中/.test(s)) return PAYMENTS.filter(p=>p.status==='待审批'||p.status==='审批中');
  if(/本月到期的/.test(s)||/今月/.test(s)) {
    const now=new Date();return PAYMENTS.filter(p=>{const d=new Date(p.due);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
  }

  // Aggregation keywords
  if(/总额/.test(s)||/总金额/.test(s)||/总共/.test(s)||/一共/.test(s)||/总计/.test(s)){
    if(/供应商/.test(s)||/部门/.test(s)) {
      // Group query
      const match=s.match(/([\u4e00-\u9fa5]+)/g);
      if(!match) return PAYMENTS;
      const kw=match.join('');
      const bySupplier=PAYMENTS.filter(p=>p.supplier.includes(kw)||p.short.includes(kw));
      if(bySupplier.length) return bySupplier;
      const byDept=PAYMENTS.filter(p=>p.dept.includes(kw));
      if(byDept.length) return byDept;
    }
    // Total
    return PAYMENTS;
  }
  if(/笔数/.test(s)||/多少笔/.test(s)||/几条/.test(s)) return PAYMENTS;
  if(/最大/.test(s)||/最高/.test(s)){
    return [PAYMENTS.reduce((a,b)=>a.amount>b.amount?a:b)];
  }
  if(/最小/.test(s)||/最低/.test(s)){
    return [PAYMENTS.reduce((a,b)=>a.amount<b.amount?a:b)];
  }

  // Amount filter
  const amtMatch=s.match(/大于(.+?)万/)||s.match(/超过(.+?)万/)||s.match(/(.+?)万以上/);
  if(amtMatch) {
    const threshold=parseFloat(amtMatch[1])*10000;
    return PAYMENTS.filter(p=>p.amount>threshold);
  }
  const smallMatch=s.match(/小于(.+?)万/)||s.match(/低于(.+?)万/)||s.match(/(.+?)万以下/);
  if(smallMatch) {
    const threshold=parseFloat(smallMatch[1])*10000;
    return PAYMENTS.filter(p=>p.amount<threshold);
  }

  // Supplier/department keyword
  const words=(s.match(/[\u4e00-\u9fa5]+/g)||[]).join('');
  let results=PAYMENTS.filter(p=>
    p.supplier.includes(words)||p.short.includes(words)||p.dept.includes(words)||p.fee.includes(words)||p.applicant.includes(words)
  );
  return results.length?results:PAYMENTS;
}

function formatAmt(n){return'¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:0})}

function summarize(results,q){
  const qs=q.toLowerCase().trim();
  if(results.length===0) return '没有找到匹配的付款记录。';
  if(results.length===PAYMENTS.length){
    if(/总额/.test(qs)||/总金额/.test(qs)||/总共/.test(qs)) {
      const total=results.reduce((s,p)=>s+p.amount,0);
      return `博西家电供应商付款总金额为 **${formatAmt(total)}**，共 ${results.length} 笔。`;
    }
    if(/笔数/.test(qs)||/多少笔/.test(qs)) return `共 **${results.length}** 笔付款记录。`;
    return `共查询到 **${results.length}** 条付款记录。`;
  }

  const total=results.reduce((s,p)=>s+p.amount,0);
  const names=[...new Set(results.map(p=>p.short))].join('、');
  const statuses=[...new Set(results.map(p=>p.status))];

  let summary=`共 **${results.length}** 条记录`;
  if(names) summary+=`，涉及 **${names}**`;
  if(total>0) summary+=`，合计 ${formatAmt(total)}`;
  if(statuses.length===1) summary+=`，状态：${statuses[0]}`;

  return summary;
}

function ask(q){
  const input=document.getElementById('chatInput');
  if(!q) q=input.value;
  if(!q||!q.trim()) return;
  input.value='';

  const chat=document.getElementById('chatMsgs');

  // User msg
  chat.innerHTML+=`<div class="msg user"><div class="bubble">${escHtml(q)}</div></div>`;

  // Loading
  chat.innerHTML+=`<div class="msg bot" id="loadingMsg"><div class="bubble"><div class="label">🤖 小龙虾</div><span class="spinner"></span>查询中…</div></div>`;
  chat.scrollTop=chat.scrollHeight;

  // Simulate delay
  setTimeout(()=>{
    document.getElementById('loadingMsg')?.remove();
    const results=queryPayments(q);
    const summary=summarize(results,q);
    let html='';

    if(results.length<=50){
      html=buildTable(results);
    }

    chat.innerHTML+=`<div class="msg bot"><div class="bubble">
      <div class="label">🤖 小龙虾 · 💡 ${summary}</div>
      ${html}
    </div></div>`;
    chat.scrollTop=chat.scrollHeight;
  },400);
}

function buildTable(results){
  if(!results.length) return '';
  return `<table class="results-table">
    <thead><tr>
      <th>供应商</th><th>金额</th><th>状态</th><th>部门</th><th>到期日</th>
    </tr></thead>
    <tbody>${results.map(p=>`<tr>
      <td><strong>${escHtml(p.short)}</strong></td>
      <td>${formatAmt(p.amount)}</td>
      <td><span class="tag ${p.status==='已付款'?'paid':p.status==='已逾期'?'overdue':'pending'}">${p.status}</span></td>
      <td>${escHtml(p.dept)}</td>
      <td>${p.due}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ═══════════════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════════════
function renderDashboard(){
  const total=PAYMENTS.reduce((s,p)=>s+p.amount,0);
  const paid=PAYMENTS.filter(p=>p.status==='已付款');
  const pending=PAYMENTS.filter(p=>p.status==='待审批'||p.status==='审批中');
  const overdue=PAYMENTS.filter(p=>p.status==='已逾期');
  const paidAmt=paid.reduce((s,p)=>s+p.amount,0);
  const pendingAmt=pending.reduce((s,p)=>s+p.amount,0);
  const overdueAmt=overdue.reduce((s,p)=>s+p.amount,0);

  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card gold"><div class="stat-num">${formatAmt(total)}</div><div class="stat-lbl">总金额</div></div>
    <div class="stat-card blue"><div class="stat-num">${PAYMENTS.length}笔</div><div class="stat-lbl">总笔数</div></div>
    <div class="stat-card green"><div class="stat-num">${paid.length}笔</div><div class="stat-lbl">✅ 已付款</div></div>
    <div class="stat-card" style="border-top:3px solid var(--warn)"><div class="stat-num" style="color:var(--warn)">${pending.length}笔</div><div class="stat-lbl">⏳ 待处理</div></div>
    <div class="stat-card red"><div class="stat-num">${overdue.length}笔</div><div class="stat-lbl">⚠️ 已逾期</div></div>
  `;

  const maxAmt=Math.max(total,1);
  document.getElementById('statusBar').innerHTML=`
    <div class="bar-paid" style="width:${paidAmt/maxAmt*100}%">已付款 ${formatAmt(paidAmt)}</div>
    <div class="bar-pending" style="width:${pendingAmt/maxAmt*100}%">待处理 ${formatAmt(pendingAmt)}</div>
    <div class="bar-overdue" style="width:${overdueAmt/maxAmt*100}%">逾期 ${formatAmt(overdueAmt)}</div>
  `;
  document.getElementById('paidCount').textContent=paid.length+'笔 '+formatAmt(paidAmt);
  document.getElementById('pendingCount').textContent=pending.length+'笔 '+formatAmt(pendingAmt);
  document.getElementById('overdueCount').textContent=overdue.length+'笔 '+formatAmt(overdueAmt);

  // Top suppliers
  const bySupplier={};
  PAYMENTS.forEach(p=>{
    if(!bySupplier[p.short]) bySupplier[p.short]={name:p.short,amt:0};
    bySupplier[p.short].amt+=p.amount;
  });
  const sorted=Object.values(bySupplier).sort((a,b)=>b.amt-a.amt).slice(0,10);
  const maxS=sorted[0]?.amt||1;
  document.getElementById('topSuppliers').innerHTML=sorted.map(s=>`
    <div class="supplier-bar">
      <span class="supplier-name">${s.name}</span>
      <span class="supplier-amt" style="color:var(--accent)">${formatAmt(s.amt)}</span>
    </div>
    <div class="bar-fill"><div style="width:${s.amt/maxS*100}%;background:var(--accent)"></div></div>
  `).join('');

  // Departments
  const byDept={};
  PAYMENTS.forEach(p=>{
    if(!byDept[p.dept]) byDept[p.dept]=0;
    byDept[p.dept]+=p.amount;
  });
  const deptColors=['#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'];
  document.getElementById('deptGrid').innerHTML=Object.entries(byDept).map(([k,v],i)=>`
    <div class="dept-item"><div class="dept-amt" style="color:${deptColors[i%deptColors.length]}">${formatAmt(v)}</div><div class="dept-name">${k}</div></div>
  `).join('');

  // Fee types
  const byFee={};
  PAYMENTS.forEach(p=>{
    if(!byFee[p.fee]) byFee[p.fee]=0;
    byFee[p.fee]+=p.amount;
  });
  const feeSorted=Object.entries(byFee).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('feeGrid').innerHTML=feeSorted.map(([k,v],i)=>`
    <div class="dept-item"><div class="dept-amt" style="color:${deptColors[i%deptColors.length]}">${formatAmt(v)}</div><div class="dept-name">${k}</div></div>
  `).join('');
}

// ═══════════════════════════════════════════════
// Presentation
// ═══════════════════════════════════════════════
function renderPresentation(){
  const total=PAYMENTS.reduce((s,p)=>s+p.amount,0);
  const paid=PAYMENTS.filter(p=>p.status==='已付款');
  const pending=PAYMENTS.filter(p=>p.status==='待审批'||p.status==='审批中');
  const overdue=PAYMENTS.filter(p=>p.status==='已逾期');

  document.getElementById('presoTotal').textContent=formatAmt(total);
  document.getElementById('presoStats').innerHTML=`
    <div class="stat-card blue"><div class="stat-num">${PAYMENTS.length}</div><div class="stat-lbl">总笔数</div></div>
    <div class="stat-card green"><div class="stat-num">${paid.length}</div><div class="stat-lbl">✅ 已付款</div></div>
    <div class="stat-card" style="border-top:3px solid var(--warn)"><div class="stat-num" style="color:var(--warn)">${pending.length}</div><div class="stat-lbl">⏳ 待处理</div></div>
    <div class="stat-card red"><div class="stat-num">${overdue.length}</div><div class="stat-lbl">⚠️ 已逾期</div></div>
  `;

  const bySupplier={};
  PAYMENTS.forEach(p=>{
    if(!bySupplier[p.short]) bySupplier[p.short]={name:p.short,amt:0,cnt:0};
    bySupplier[p.short].amt+=p.amount;
    bySupplier[p.short].cnt++;
  });
  const sorted=Object.values(bySupplier).sort((a,b)=>b.amt-a.amt).slice(0,10);
  document.getElementById('presoSuppliers').innerHTML=sorted.map(s=>`
    <div class="supplier-bar"><span class="supplier-name">${s.name}</span><span class="supplier-amt" style="color:var(--warn)">${s.cnt}笔 ${formatAmt(s.amt)}</span></div>
  `).join('');

  const byDept={};
  PAYMENTS.forEach(p=>{
    if(!byDept[p.dept]) byDept[p.dept]=0;
    byDept[p.dept]+=p.amount;
  });
  document.getElementById('presoDepts').innerHTML=Object.entries(byDept).map(([k,v])=>{
    const pct=(v/total*100).toFixed(1);
    return `<div class="supplier-bar"><span class="supplier-name">${k}</span><span class="supplier-amt" style="color:var(--accent)">${pct}% ${formatAmt(v)}</span><div class="bar-fill"><div style="width:${pct*3}%;background:var(--accent)"></div></div></div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// Navigation
// ═══════════════════════════════════════════════
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector(`.tabs button[onclick*="'${name}'"]`).classList.add('active');
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
renderDashboard();
renderPresentation();
</script>
